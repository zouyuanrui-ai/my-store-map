                              icon: `//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-${iconColor}.png`                                                                                             
                          });                                                                                                                                                                                   
                          marker.setMap(map);                                                                                                                                                                   
                          markers.push(marker);                                                                                                                                                                 
                                                                                                                                                                                                                
                          marker.on('click', function() {                                                                                                                                                       
                              const typeTag = store.type ? `<span style="padding:2px 6px;background:#${iconColor === 'red' ? 'ff4d4f' : iconColor === 'orange' ? 'fa8c16' :                                     
  '1890ff'};color:white;border-radius:3px;font-size:11px;margin-left:5px;">${store.type}</span>` : '';                                                                                                          
                              const infoWindow = new AMap.InfoWindow({                                                                                                                                        
                                  content: `<div style="padding:10px;">                                                                                                                                         
                                      <h3 style="margin:0 0 5px 0;">${store.name}${typeTag}</h3>                                                                                                                
                                      <p style="margin:0;font-size:12px;color:#666;">${store.address}</p>                                                                                                       
                                  </div>`                                                                                                                                                                       
                              });                                                                                                                                                                               
                              infoWindow.open(map, marker.getPosition());                                                                                                                                       
                          });                                                                                                                                                                                   
                      } else {                                                                                                                                                                                  
                          console.error('地址解析失败:', store.address, result);                                                                                                                                
                      }                                                                                                                                                                                         
                  } catch (error) {                                                                                                                                                                             
                      console.error('地址解析错误:', store.address, error);                                                                                                                                     
                  }                                                                                                                                                                                             
              }                                                                                                                                                                                                 
                                                                                                                                                                                                                
              displayStores();                                                                                                                                                                                  
          }                                                                                                                                                                                                     
                                                                                                                                                                                                                
          function calculateDistance(lat1, lng1, lat2, lng2) {                                                                                                                                                  
              const R = 6371;
              const dLat = (lat2 - lat1) * Math.PI / 180;                                                                                                                                                       
              const dLng = (lng2 - lng1) * Math.PI / 180;                                                                                                                                                       
              const a = Math.sin(dLat/2) * Math.sin(dLat/2) +                                                                                                                                                   
                       Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *                                                                                                                        
                       Math.sin(dLng/2) * Math.sin(dLng/2);                                                                                                                                                     
              const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));                                                                                                                                           
              return R * c;                                                                                                                                                                                     
          }                                                                                                                                                                                                     
                                                                                                                                                                                                              
          function displayStores() {
              if (userLocation) {
                  stores.forEach(store => {                                                                                                                                                                     
                      if (store.lng && store.lat) {
                          store.distance = calculateDistance(                                                                                                                                                   
                              userLocation.lat, userLocation.lng,                                                                                                                                               
                              store.lat, store.lng                                                                                                                                                              
                          );                                                                                                                                                                                    
                      }                                                                                                                                                                                         
                  });                                                                                                                                                                                           
                                                                                                                                                                                                                
                  stores.sort((a, b) => (a.distance || 999999) - (b.distance || 999999));                                                                                                                       
              }                                                                                                                                                                                                 
                                                                                                                                                                                                                
              const listHtml = stores.map((store, idx) => {                                                                                                                                                     
                  const realIndex = allStores.findIndex(s =>                                                                                                                                                    
                      s.name === store.name && s.address === store.address                                                                                                                                      
                  );                                                                                                                                                                                            
                                                                                                                                                                                                                
                  let distanceHtml = '';                                                                                                                                                                        
                  if (store.distance !== undefined) {                                                                                                                                                         
                      if (store.distance < 1) {                                                                                                                                                                 
                          distanceHtml = `<div class="store-distance">📍 距离您 ${(store.distance * 1000).toFixed(0)} 米</div>`;                                                                                
                      } else {                                                                                                                                                                                  
                          distanceHtml = `<div class="store-distance">📍 距离您 ${store.distance.toFixed(1)} 公里</div>`;                                                                                       
                      }                                                                                                                                                                                         
                  }                                                                                                                                                                                             
                                                                                                                                                                                                                
                  let notesHtml = '';                                                                                                                                                                           
                  if (store.notes) {                                                                                                                                                                          
                      notesHtml = `<div class="store-notes">💭 ${store.notes}</div>`;                                                                                                                           
                  }                                                                                                                                                                                             
                                                                                                                                                                                                                
                  let navUrl = '';                                                                                                                                                                              
                  if (store.lng && store.lat) {                                                                                                                                                               
                      navUrl = `https://uri.amap.com/navigation?to=${store.lng},${store.lat},${store.name}&mode=car&policy=1&src=myapp&coordinate=gaode&callnative=0`;                                          
                  }                                                                                                                                                                                             
                                                                                                                                                                                                                
                  let typeHtml = '';                                                                                                                                                                            
                  if (store.type) {                                                                                                                                                                             
                      typeHtml = `<span class="type-tag type-${store.type}">${store.type}</span>`;                                                                                                              
                  }                                                                                                                                                                                             
                                                                                                                                                                                                                
                  return `                                                                                                                                                                                      
                      <div class="store-item">                                                                                                                                                                  
                          ${typeHtml}                                                                                                                                                                           
                          <div class="store-name">${store.name}</div>                                                                                                                                           
                          <div class="store-address">${store.address}</div>                                                                                                                                     
                          ${distanceHtml}                                                                                                                                                                       
                          ${notesHtml}                                                                                                                                                                          
                          <div class="store-actions">                                                                                                                                                           
                              ${navUrl ? `<a href="${navUrl}" class="navigate-btn">🧭 导航</a>` : ''}                                                                                                           
                              <button class="btn-edit" onclick="openEditModal(${realIndex})">✏️  编辑</button>                                                                                                   
                              <button class="btn-delete" onclick="deleteStore(${realIndex})">🗑️  删除</button>                                                                                                   
                          </div>                                                                                                                                                                                
                      </div>                                                                                                                                                                                    
                  `;                                                                                                                                                                                            
              }).join('');                                                                                                                                                                                      
                                                                                                                                                                                                                
              document.getElementById('storeList').innerHTML = listHtml || '<div class="loading">暂无店铺数据</div>';                                                                                           
          }                                                                                                                                                                                                     
      </script>                                                                                                                                                                                                 
  </body>                                                                                                                                                                                                     
  </html>
